<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768">
  <!-- Kraft background -->
  <rect width="1024" height="768" fill="#D8C5A0"/>
  <line x1="0" y1="0" x2="1024" y2="1024" stroke="#B8A880" stroke-width="1" opacity="0.25"/>
  <line x1="150" y1="0" x2="1024" y2="874" stroke="#B8A880" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="0" x2="1024" y2="724" stroke="#B8A880" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="150" x2="874" y2="1024" stroke="#B8A880" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="300" x2="724" y2="1024" stroke="#B8A880" stroke-width="1" opacity="0.2"/>

  <!-- Mouse body — compact/mini version, same organic style -->
  <path d="M 458 168 C 348 168 304 220 300 292 L 292 482 C 288 578 374 626 512 626 C 650 626 736 578 732 482 L 724 292 C 720 220 676 168 566 168 Z"
        fill="#F5EFE4" stroke="#1A1A1A" stroke-width="2.5" opacity="0.9"/>

  <!-- Cutout holes — organic lattice, smaller for mini -->
  <ellipse cx="346" cy="318" rx="22" ry="36" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="336" cy="412" rx="18" ry="30" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="346" cy="502" rx="20" ry="28" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="678" cy="318" rx="22" ry="36" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="688" cy="412" rx="18" ry="30" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="678" cy="502" rx="20" ry="28" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="512" cy="580" rx="48" ry="20" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.6"/>

  <!-- Button split line -->
  <line x1="512" y1="168" x2="512" y2="322" stroke="#1A1A1A" stroke-width="2" opacity="0.3"/>

  <!-- Button / palm divider -->
  <path d="M 310 326 C 400 348 624 348 714 326" fill="none" stroke="#1A1A1A" stroke-width="2" opacity="0.2"/>

  <!-- Scroll wheel -->
  <rect x="499" y="238" width="26" height="60" rx="13" fill="#C4B898" stroke="#1A1A1A" stroke-width="1.5" opacity="0.85"/>
  <line x1="499" y1="257" x2="525" y2="257" stroke="#9A8868" stroke-width="1.2" opacity="0.7"/>
  <line x1="499" y1="265" x2="525" y2="265" stroke="#9A8868" stroke-width="1.2" opacity="0.7"/>
  <line x1="499" y1="273" x2="525" y2="273" stroke="#9A8868" stroke-width="1.2" opacity="0.7"/>
  <line x1="499" y1="281" x2="525" y2="281" stroke="#9A8868" stroke-width="1.2" opacity="0.7"/>

  <!-- Wireless indicator dot -->
  <circle cx="512" cy="192" r="5" fill="#5CAD4A" opacity="0.9"/>

  <!-- Leaf accent -->
  <circle cx="960" cy="48" r="18" fill="#5CAD4A"/>
  <line x1="960" y1="38" x2="960" y2="58" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="950" y1="48" x2="970" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Labels -->
  <text x="48" y="52" font-family="monospace" font-size="13" fill="#1A1A1A" opacity="0.55" font-weight="500">HACK'IT · M—02 · 3D PRINTED MOUSE</text>
  <text x="48" y="720" font-family="monospace" font-size="13" fill="#1A1A1A" opacity="0.55">MINI · 99 × 58 × 35 mm · WIRELESS</text>
</svg>
