<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768">
  <!-- Kraft background -->
  <rect width="1024" height="768" fill="#D8C5A0"/>
  <line x1="0" y1="0" x2="1024" y2="1024" stroke="#B8A880" stroke-width="1" opacity="0.25"/>
  <line x1="150" y1="0" x2="1024" y2="874" stroke="#B8A880" stroke-width="1" opacity="0.2"/>
  <line x1="300" y1="0" x2="1024" y2="724" stroke="#B8A880" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="150" x2="874" y2="1024" stroke="#B8A880" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="300" x2="724" y2="1024" stroke="#B8A880" stroke-width="1" opacity="0.2"/>

  <!-- Mouse body — organic top-down shape, 3D printed look -->
  <!-- Outer shell -->
  <path d="M 440 140 C 310 140 260 200 255 280 L 245 480 C 240 590 340 650 512 650 C 684 650 784 590 779 480 L 769 280 C 764 200 714 140 584 140 Z"
        fill="#F5EFE4" stroke="#1A1A1A" stroke-width="2.5" opacity="0.9"/>

  <!-- Cutout holes — organic lattice pattern, 3D print style -->
  <!-- Left side cutouts -->
  <ellipse cx="318" cy="310" rx="28" ry="42" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="305" cy="420" rx="22" ry="36" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="318" cy="520" rx="26" ry="34" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <!-- Right side cutouts -->
  <ellipse cx="706" cy="310" rx="28" ry="42" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="719" cy="420" rx="22" ry="36" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="706" cy="520" rx="26" ry="34" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.7"/>
  <!-- Rear cutout -->
  <ellipse cx="512" cy="600" rx="60" ry="24" fill="#D8C5A0" stroke="#1A1A1A" stroke-width="1.5" opacity="0.6"/>

  <!-- Button split line -->
  <line x1="512" y1="140" x2="512" y2="310" stroke="#1A1A1A" stroke-width="2" opacity="0.3"/>

  <!-- Button / palm divider -->
  <path d="M 285 315 C 390 340 634 340 739 315" fill="none" stroke="#1A1A1A" stroke-width="2" opacity="0.2"/>

  <!-- Scroll wheel -->
  <rect x="497" y="220" width="30" height="70" rx="15" fill="#C4B898" stroke="#1A1A1A" stroke-width="1.5" opacity="0.85"/>
  <line x1="497" y1="242" x2="527" y2="242" stroke="#9A8868" stroke-width="1.2" opacity="0.7"/>
  <line x1="497" y1="251" x2="527" y2="251" stroke="#9A8868" stroke-width="1.2" opacity="0.7"/>
  <line x1="497" y1="260" x2="527" y2="260" stroke="#9A8868" stroke-width="1.2" opacity="0.7"/>
  <line x1="497" y1="269" x2="527" y2="269" stroke="#9A8868" stroke-width="1.2" opacity="0.7"/>
  <line x1="497" y1="278" x2="527" y2="278" stroke="#9A8868" stroke-width="1.2" opacity="0.7"/>

  <!-- Wireless indicator dot (no cable) -->
  <circle cx="512" cy="168" r="6" fill="#5CAD4A" opacity="0.9"/>

  <!-- Leaf accent -->
  <circle cx="960" cy="48" r="18" fill="#5CAD4A"/>
  <line x1="960" y1="38" x2="960" y2="58" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="950" y1="48" x2="970" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Labels -->
  <text x="48" y="52" font-family="monospace" font-size="13" fill="#1A1A1A" opacity="0.55" font-weight="500">HACK'IT · M—01 · 3D PRINTED MOUSE</text>
  <text x="48" y="720" font-family="monospace" font-size="13" fill="#1A1A1A" opacity="0.55">REGULAR · 125 × 67 × 42 mm · WIRELESS</text>
</svg>
